name: Deploy SaraTube to K3s

on:
  push:
    branches:
      - k3s-local-supabase-lab
      - main
  workflow_dispatch:

env:
  REGISTRY: 192.168.0.101:5050
  IMAGE_NAME: saratube-kids-channel
  NAMESPACE: saratube-app
  DEPLOYMENT_NAME: saratube-app
  CONTAINER_NAME: saratube-app

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show build info
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"
          echo "Runner: $(hostname)"

      - name: Build Docker image
        run: |
          IMAGE_TAG="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
          LATEST_TAG="${REGISTRY}/${IMAGE_NAME}:latest"

          echo "Building image: $IMAGE_TAG"

          docker build -t "$IMAGE_TAG" -t "$LATEST_TAG" .

      - name: Push Docker image
        run: |
          IMAGE_TAG="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
          LATEST_TAG="${REGISTRY}/${IMAGE_NAME}:latest"

          docker push "$IMAGE_TAG"
          docker push "$LATEST_TAG"

      - name: Deploy to K3s
        run: |
          IMAGE_TAG="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"

          kubectl set image deployment/${DEPLOYMENT_NAME} \
            ${CONTAINER_NAME}="$IMAGE_TAG" \
            -n ${NAMESPACE}

          kubectl rollout status deployment/${DEPLOYMENT_NAME} \
            -n ${NAMESPACE} \
            --timeout=180s

      - name: Show deployed image
        run: |
          kubectl get deployment ${DEPLOYMENT_NAME} \
            -n ${NAMESPACE} \
            -o jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'
