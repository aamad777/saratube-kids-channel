name: Deploy SaraTube Backend API

on:
  push:
    branches:
      - hardening/docker-security-baseline
    paths:
      - "backend-api/**"
      - ".github/workflows/deploy-backend-api.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_WEBAPP_NAME: AS-WEU-DEV-SAR-API
  NODE_VERSION: "24"

jobs:
  build:
    name: Prepare backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-api

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend-api/package-lock.json

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Verify backend files
        run: |
          test -f server.js
          test -f db.js
          test -f package.json
          test -f package-lock.json
          echo "Backend deployment files verified."

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: saratube-backend-api
          path: backend-api
          include-hidden-files: true
          if-no-files-found: error

  deploy:
    name: Deploy backend to Azure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: saratube-backend-api
          path: backend-api

      - name: Sign in to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: backend-api
