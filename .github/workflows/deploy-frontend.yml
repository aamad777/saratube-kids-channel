name: Deploy SaraTube Frontend

on:
  push:
    branches:
      - hardening/docker-security-baseline
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "tailwind.config.*"
      - "postcss.config.*"
      - ".github/workflows/deploy-frontend.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_WEBAPP_NAME: AS-WEU-DEV-SAR-WEB
  NODE_VERSION: "24"

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate frontend API URL
        shell: bash
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL is missing."
            exit 1
          fi

          echo "Frontend API URL is configured."

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Verify frontend build
        run: |
          test -f dist/index.html
          echo "Frontend build verified."

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: saratube-frontend
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy frontend to Azure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: saratube-frontend
          path: dist

      - name: Sign in to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: dist
