apiVersion: apps/v1
kind: Deployment
metadata:
  name: saratube-frontend
  namespace: saratube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saratube-frontend
  template:
    metadata:
      labels:
        app: saratube-frontend
    spec:
      containers:
        - name: frontend
          image: 192.168.0.101:5050/saratube-frontend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: saratube-frontend
  namespace: saratube
spec:
  type: NodePort
  selector:
    app: saratube-frontend
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30081
