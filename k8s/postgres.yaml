apiVersion: v1
kind: Secret
metadata:
  name: saratube-postgres-secret
  namespace: saratube
type: Opaque
stringData:
  POSTGRES_DB: saratube
  POSTGRES_USER: saratube
  POSTGRES_PASSWORD: saratube_dev_password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: saratube-postgres-pvc
  namespace: saratube
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saratube-postgres
  namespace: saratube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saratube-postgres
  template:
    metadata:
      labels:
        app: saratube-postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          envFrom:
            - secretRef:
                name: saratube-postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: saratube-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: saratube-postgres
  namespace: saratube
spec:
  type: ClusterIP
  selector:
    app: saratube-postgres
  ports:
    - port: 5432
      targetPort: 5432
